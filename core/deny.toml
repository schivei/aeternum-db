# ── Advisories ────────────────────────────────────────────────────────────────
# Checks crates against the RustSec advisory database.
[advisories]
# Deny any crate with a known security vulnerability
vulnerability = "deny"

# Warn on unmaintained crates (flag but don't fail)
unmaintained = "warn"

# Warn on security notices
notice = "warn"

# Advisory IDs to ignore (add known false-positives here)
ignore = []

# ── Licenses ──────────────────────────────────────────────────────────────────
# Enforces an approved license allow-list for all transitive dependencies.
[licenses]
# Deny crates with no detectable license
unlicensed = "deny"

# Approved open-source licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
]

# Warn on copyleft licenses (allow with visibility)
copyleft = "warn"

# Accept crates that are dual-licensed under an OSI-approved OR FSF-free license
allow-osi-fsf-free = "either"

# Reject anything not in the allow list
default = "deny"

# Minimum confidence score for license text detection
confidence-threshold = 0.8

# Per-crate license exceptions (use only when truly necessary)
exceptions = []

# ── Bans ──────────────────────────────────────────────────────────────────────
# Prevents use of specific crates or flags duplicate dependency versions.
[bans]
# Warn when multiple versions of the same crate are resolved
multiple-versions = "all"

# Deny wildcard version requirements (e.g. *)
wildcards = "deny"

# Highlight strategy for dotgraph output
highlight = "all"

# Crates that are explicitly banned
deny = [
    # Example: { name = "openssl", reason = "Use rustls instead" }
]

# Crates to skip when checking for duplicate versions (add known-safe duplicates)
skip = []

# Skip entire dependency subtrees for duplicate-version checks
skip-tree = []

# ── Sources ───────────────────────────────────────────────────────────────────
# Restricts which crate registries and git sources are allowed.
[sources]
# Warn on crates from unknown registries
unknown-registry = "warn"

# Warn on crates pulled from git (must be in allow-git list)
unknown-git = "deny"

# Only allow crates from crates.io
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# Allowed git sources (add trusted forks/pre-release crates here)
allow-git = []
