sonar.projectKey=schivei_aeternum-db
sonar.organization=schivei

sonar.projectName=AeternumDB
sonar.projectVersion=0.1.0

# Source directories
sonar.sources=core/src

# Test directories
sonar.tests=core/src

# Test file patterns (Rust inline tests)
sonar.test.inclusions=core/src/**/*

# Language
sonar.language=rust

# LCOV coverage report (generated by cargo-llvm-cov in CI)
sonar.coverageReportPaths=core/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/target/**,**/*.lock,**/vendor/**
