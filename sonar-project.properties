sonar.projectKey=schivei_aeternum-db
sonar.organization=schivei

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=aeternum-db
#sonar.projectVersion=1.0

# Source and test directories
sonar.sources=core/src
sonar.tests=core/tests

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Rust tooling: point Clippy sensor at the correct Cargo manifest
sonar.rust.cargo.path=core/Cargo.toml

# LCOV coverage report (generated by cargo-llvm-cov in CI)
# sonar.lcov.reportPaths is the correct property for LCOV format files;
# sonar.coverageReportPaths is for XML-based Generic Coverage format only.
sonar.lcov.reportPaths=core/lcov.info
