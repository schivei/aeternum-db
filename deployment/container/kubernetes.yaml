apiVersion: v1
kind: Namespace
metadata:
  name: aeternumdb
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aeternumdb-config
  namespace: aeternumdb
data:
  config.yaml: |
    # AeternumDB configuration
    listen_address: "0.0.0.0:5432"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aeternumdb
  namespace: aeternumdb
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aeternumdb
  template:
    metadata:
      labels:
        app: aeternumdb
    spec:
      containers:
      - name: aeternumdb
        image: aeternumdb:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: database
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/aeternumdb
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: aeternumdb
  namespace: aeternumdb
spec:
  selector:
    app: aeternumdb
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432
  type: ClusterIP
