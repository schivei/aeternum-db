name: CI/CD

on:
  push:
    branches: [ '**' ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test-core:
    name: Test Core Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: core/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        working-directory: ./core
        run: cargo test --verbose

      - name: Run clippy
        working-directory: ./core
        run: cargo clippy -- -D warnings

      - name: Check formatting
        working-directory: ./core
        run: cargo fmt -- --check

  build-core:
    name: Build Core Engine
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        working-directory: ./core
        run: cargo build --release --verbose

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: aeternumdb-${{ matrix.os }}
          path: |
            core/target/release/aeternumdb
            core/target/release/aeternumdb.exe

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate code coverage
        working-directory: ./core
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Generate coverage report
        working-directory: ./core
        run: |
          COVERAGE=$(cargo llvm-cov --all-features --workspace --summary-only 2>&1 | grep "^TOTAL" | awk '{print $10}' | tr -d '%')
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV
          echo "## 📊 Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage: ${COVERAGE}%**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cargo llvm-cov --all-features --workspace >> $GITHUB_STEP_SUMMARY

      - name: Check coverage threshold
        working-directory: ./core
        run: |
          THRESHOLD=80
          COVERAGE=${{ env.COVERAGE }}
          echo "Coverage: ${COVERAGE}%"
          echo "Threshold: ${THRESHOLD}%"
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"
          fi

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const coverage = process.env.COVERAGE;
            const threshold = 80;
            const status = parseFloat(coverage) >= threshold ? '✅' : '❌';

            const comment = `## ${status} Code Coverage Report

            **Coverage: ${coverage}%** (Threshold: ${threshold}%)

            ${parseFloat(coverage) >= threshold
              ? '✅ Coverage meets the required threshold.'
              : '❌ Coverage is below the required threshold. Please add more tests.'}

            <details>
            <summary>View detailed coverage report</summary>

            Run \`cargo llvm-cov --all-features --workspace\` locally to see detailed coverage.

            </details>`;

            // Find existing coverage comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Code Coverage Report')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test-core
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deployment/container/Dockerfile
          push: false
          tags: aeternumdb:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
